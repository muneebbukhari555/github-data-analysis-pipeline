name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/github-pipeline-analysis

jobs:
  Code-Quality-Checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest tests/ -v

  Docker-Build-And-Push:
    runs-on: ubuntu-latest
    needs: Code-Quality-Checks
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  APP-Deploy-On-Azure-VM:
    runs-on: ubuntu-latest
    needs: Docker-Build-And-Push
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/github-pipeline-analysis/"

      - name: Deploy on Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/github-pipeline-analysis
            cat > .env << 'ENVEOF'
            GITHUB_TOKEN=${{ secrets.GIT_TOKEN }}
            MONGO_URI=${{ secrets.MONGO_URI }}
            MONGO_DB=github_pipeline_analysis
            LOG_LEVEL=INFO
            MAX_API_PAGES=5
            ENVEOF

            # Pull latest image and restart MongoDB + Dashboard containers
            docker compose pull dashboard
            docker compose up -d mongodb dashboard

            # Run one initial data collection on fresh deploy
            docker compose --profile collect run --rm collector

            echo "Deployment complete at $(date)"
