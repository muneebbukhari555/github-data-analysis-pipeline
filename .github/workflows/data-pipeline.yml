name: Scheduled Data Collection

on:
  schedule:
    # Run every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger data collection on Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/github-pipeline-analysis
            # Spin up collector container, run pipeline, then exit
            # MongoDB container is already running and reachable via Docker network
            docker compose --profile collect run --rm collector
            echo "Data collection completed at $(date)"