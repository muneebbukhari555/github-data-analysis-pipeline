name: Run GitHub Data Pipeline

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas matplotlib requests

      - name: Run script
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: python main.py